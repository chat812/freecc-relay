name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-amd64
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: linux-arm64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/freecc-relay${{ matrix.ext }}"
          dst="freecc-relay-${{ matrix.name }}${{ matrix.ext }}"
          mv "$src" "$dst"
          echo "BINARY=$dst" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freecc-relay-${{ matrix.name }}
          path: ${{ env.BINARY }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Install

            **Quick install (Linux):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/chat812/freecc-relay/main/install.sh | sudo bash
            ```

            **Or download the binary directly:**
            ```bash
            # Linux amd64
            wget https://github.com/chat812/freecc-relay/releases/latest/download/freecc-relay-linux-amd64
            chmod +x freecc-relay-linux-amd64
            ./freecc-relay-linux-amd64 --port 8081
            ```

            **Or build from source (Rust):**
            ```bash
            git clone https://github.com/chat812/freecc-relay.git
            cd freecc-relay && cargo build --release
            ./target/release/freecc-relay --port 8081
            ```
